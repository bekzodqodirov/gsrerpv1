services:
  db:
    image: postgres:16-alpine
    container_name: gsr_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gsr
      POSTGRES_PASSWORD: gsr_dev_password
      POSTGRES_DB: gsr_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gsr -d gsr_erp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
